name: Test

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

jobs:
  test:
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Hub Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: https://github.com/docker/scout-demo-service.git#fix-all-cves
          push: false
          load: true
          tags: docker/scout-demo-service:fix
      - name: TEST quickview no image
        uses: ./
        with:
          command: quickview
          write-comment: false
      - name: TEST quickview
        uses: ./
        with:
          command: quickview
          image: docker/scout-demo-service:main
          write-comment: false
      - name: TEST cves
        uses: ./
        with:
          command: cves
          image: docker/scout-demo-service:main
          write-comment: false
      - name: TEST compare images
        uses: ./
        with:
          command: compare
          image: registry://docker/scout-demo-service:main
          to: local://docker/scout-demo-service:fix
          exit-code: false
          write-comment: false
